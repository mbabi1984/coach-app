<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تطبيق التدريب</title>
<link rel="manifest" href="manifest.webmanifest">

<style>
  :root{--ink:#14161B;--ink-2:#1C1F26;--ink-3:#262A33;--ink-4:#2F343E;--ink-5:#3A404C;
    --text:#E9E7E2;--muted:#888E9B;--line:rgba(255,255,255,.07);--line-2:rgba(255,255,255,.12);
    --ember:#FF5A36;--mint:#34D8A6;--warn:#F2B33D;--blue:#7C9CFF;}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:radial-gradient(1200px 600px at 80% -10%,rgba(255,90,54,.10),transparent 60%),radial-gradient(900px 500px at -10% 110%,rgba(52,216,166,.07),transparent 55%),var(--ink);
    color:var(--text);font-family:'Cairo',system-ui,sans-serif;-webkit-font-smoothing:antialiased;min-height:100%;padding:22px 16px 60px}
  .mono{font-family:'Space Mono',monospace}
  .eyebrow{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}
  input,select,button,textarea{font-family:inherit}
  :focus-visible{outline:2px solid var(--ember);outline-offset:2px}
  .stage{max-width:1180px;margin:0 auto}
  .bar{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:22px}
  .brand{display:flex;align-items:center;gap:11px;margin-inline-end:auto}
  .logo{width:38px;height:38px;border-radius:11px;background:linear-gradient(150deg,var(--ember),#ff8c4b);display:grid;place-items:center;font-weight:900;color:#1b0d07;font-size:19px}
  .brand h1{font-size:16px;font-weight:900;line-height:1}
  .brand .tag{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.16em;color:var(--muted);text-transform:uppercase;margin-top:3px}
  .toggle{display:inline-flex;background:var(--ink-2);border:1px solid var(--line);border-radius:12px;padding:4px;gap:2px}
  .toggle button{font-weight:700;font-size:13px;color:var(--muted);background:transparent;border:0;border-radius:8px;padding:8px 14px;cursor:pointer;transition:.18s;white-space:nowrap}
  .toggle button:hover{color:var(--text)}.toggle button.on{background:var(--ink-4);color:var(--text)}
  .toggle.lang button.on{background:var(--ember);color:#1b0d07}
  .card{background:var(--ink-2);border:1px solid var(--line);border-radius:16px}
  .panel-h{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--line)}
  .panel-h h3{font-size:14px;font-weight:700}
  .rhythm{display:flex;gap:4px}
  .cell{width:14px;height:21px;border-radius:4px;background:var(--ink-4)}
  .cell.done{background:var(--mint)}.cell.today{background:transparent;border:1.5px solid var(--ember);box-shadow:0 0 0 3px rgba(255,90,54,.16)}
  .cell.miss{background:rgba(242,179,61,.18);border:1px solid var(--warn)}
  .cell.rest{background:repeating-linear-gradient(45deg,var(--ink-3),var(--ink-3) 3px,transparent 3px,transparent 6px)}
  .btn{font-weight:700;font-size:13px;border-radius:10px;padding:9px 14px;cursor:pointer;border:1px solid var(--line-2);background:var(--ink-3);color:var(--text);transition:.15s}
  .btn:hover{border-color:var(--ember)}.btn.pri{background:var(--ember);color:#1b0d07;border-color:transparent}
  .btn.sm{font-size:12px;padding:6px 10px}
  .chip{font-family:'Space Mono',monospace;font-size:10.5px;padding:4px 9px;border-radius:999px;border:1px solid var(--line-2);color:var(--muted)}
  .browser{border:1px solid var(--line-2);border-radius:18px;overflow:hidden;background:var(--ink);box-shadow:0 30px 80px rgba(0,0,0,.45)}
  .chrome{display:flex;align-items:center;gap:8px;padding:11px 14px;background:var(--ink-2);border-bottom:1px solid var(--line)}
  .dots{display:flex;gap:6px}.dots i{width:11px;height:11px;border-radius:50%;display:block}

  .url{flex:1;background:var(--ink);border:1px solid var(--line);border-radius:8px;padding:6px 12px;font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);text-align:center}

  .side .who .nm{font-size:13px;font-weight:700;line-height:1.1}.side .who .rl{font-size:10.5px;color:var(--muted)}
  .nav{display:flex;align-items:center;gap:11px;padding:10px 11px;border-radius:10px;cursor:pointer;color:var(--muted);font-size:13.5px;font-weight:600;transition:.15s}
  .nav:hover{background:var(--ink-3);color:var(--text)}.nav.on{background:var(--ink-4);color:var(--text)}
  .nav .g{font-size:16px;width:20px;text-align:center;flex:none}

  @media(max-width:820px){.stats-row{grid-template-columns:repeat(2,1fr)}}

  .two{display:grid;grid-template-columns:1.5fr 1fr;gap:14px}@media(max-width:820px){.two{grid-template-columns:1fr}}

  .crow:hover{background:var(--ink-3)}.crow.sel{background:var(--ink-3);border-color:var(--line-2)}
  .av{width:38px;height:38px;border-radius:11px;flex:none;display:grid;place-items:center;font-weight:700;font-size:14px;color:#10131a}
  .crow .who2{flex:1;min-width:0}.crow .nm{font-size:14px;font-weight:700}.crow .gl{font-size:11.5px;color:var(--muted);margin-top:2px}

  .bar-mini{height:4px;border-radius:3px;background:var(--ink-4);margin-top:5px;overflow:hidden}.bar-mini i{display:block;height:100%}
  .qa{display:flex;gap:6px;flex:none}.qbtn{width:30px;height:30px;border-radius:8px;border:1px solid var(--line-2);background:var(--ink-2);color:var(--muted);cursor:pointer;font-size:14px}.qbtn:hover{color:var(--ember);border-color:var(--ember)}
  .trow{display:flex;align-items:center;gap:11px;padding:10px}.trow:hover{background:var(--ink-3);border-radius:10px}.tdot{width:9px;height:9px;border-radius:50%;flex:none}.trow .tt{flex:1}.trow .a{font-size:13px;font-weight:600}.trow .b{font-size:11px;color:var(--muted);margin-top:2px}.trow .time{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted)}
  .back{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-size:12.5px;cursor:pointer;margin-bottom:12px}.back:hover{color:var(--text)}
  .cd-head{display:flex;align-items:center;gap:15px;flex-wrap:wrap;margin-bottom:14px}.cd-head .av{width:56px;height:56px;border-radius:15px;font-size:20px}.cd-head .nm{font-size:20px;font-weight:900}.cd-head .meta{font-size:12.5px;color:var(--muted);margin-top:3px;display:flex;gap:8px;flex-wrap:wrap}.cd-head .acts{margin-inline-start:auto;display:flex;gap:8px}
  .subtabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:16px;flex-wrap:wrap}.subtab{padding:9px 14px;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}.subtab:hover{color:var(--text)}.subtab.on{color:var(--text);border-bottom-color:var(--ember)}
  .info-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}@media(max-width:820px){.info-grid{grid-template-columns:1fr}}
  .ic-card{padding:15px}.ic-card .eyebrow{margin-bottom:11px}
  .kv{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--line);font-size:13px}.kv:last-child{border-bottom:0}.kv .k{color:var(--muted)}.kv .v{font-weight:600}.kv .v.mono{font-family:'Space Mono',monospace}
  .tags{display:flex;gap:7px;flex-wrap:wrap;margin-top:4px}.tag-i{font-size:11.5px;padding:5px 10px;border-radius:999px;background:var(--ink-3);border:1px solid var(--line-2)}.tag-i.warn{color:var(--warn);border-color:rgba(242,179,61,.3);background:rgba(242,179,61,.08)}
  .daysel{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}.dbtn{flex:1;min-width:60px;text-align:center;padding:10px 6px;border-radius:11px;border:1px solid var(--line);background:var(--ink-2);cursor:pointer}.dbtn:hover{border-color:var(--line-2)}.dbtn.on{background:var(--ink-4);border-color:var(--ember)}.dbtn .d{font-size:12.5px;font-weight:700}.dbtn .pt{width:7px;height:7px;border-radius:50%;margin:5px auto 0}
  .wc{display:flex;gap:9px;align-items:flex-start;background:var(--ink-2);border:1px dashed var(--line-2);border-radius:12px;padding:11px 13px;margin-bottom:11px}
  .wc .lbl{font-family:'Space Mono';font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--blue);padding-top:9px;flex:none;width:64px}
  .wc input{flex:1;background:transparent;border:0;color:var(--text);font-size:13px;padding:8px 0}
  .day-title-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}.day-title-row input{flex:1;background:var(--ink-2);border:1px solid var(--line);border-radius:10px;padding:10px 13px;color:var(--text);font-size:15px;font-weight:700}

  .exr-h{display:flex;align-items:center;gap:11px;margin-bottom:11px}
  .ss-badge{font-family:'Space Mono';font-size:11px;font-weight:700;color:var(--blue);background:rgba(124,156,255,.12);border:1px solid rgba(124,156,255,.3);border-radius:7px;padding:3px 7px;flex:none}

  .exr-fields{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}@media(max-width:820px){.exr-fields{grid-template-columns:repeat(3,1fr)}}

  .add-row{display:flex;gap:9px;flex-wrap:wrap;margin-top:4px}
  .lib-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:13px}@media(max-width:820px){.lib-grid{grid-template-columns:repeat(2,1fr)}}

  .vthumb{aspect-ratio:16/10;background:linear-gradient(135deg,var(--ink-3),var(--ink-4));position:relative;display:grid;place-items:center}.vthumb img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}

  .lib-meta{padding:11px 12px}.lib-meta .a{font-size:13.5px;font-weight:700}.lib-meta .b{font-size:11.5px;color:var(--muted);margin-top:2px}.lib-meta .m{margin-top:8px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}

async function addExerciseDB(row){const {data,error}=await sb.from('exercises').insert(row).select().maybeSingle();if(error){console.error(error);toast(st.lang==='ar'?'خطأ بالحفظ':'Save error');return null;}return data;}

async function addClientDB(name){const code='CM-'+Math.random().toString(36).slice(2,6).toUpperCase();const {data,error}=await sb.from('clients').insert({name:name||(st.lang==='ar'?'مشترك':'Client'),invite_code:code}).select().maybeSingle();if(error){console.error(error);toast(st.lang==='ar'?'خطأ':'Error');return null;}return data;}

/* ---- chat (realtime) ---- */
function curClientId(){ return st.role==='coach' ? (clients[st.sel]&&clients[st.sel]._id) : (clients[0]&&clients[0]._id); }
async function loadChat(cid){ if(!sb||!cid){MSGS=[];return;} const {data,error}=await sb.from('messages').select('*').eq('client_id',cid).order('created_at'); MSGS=error?[]:(data||[]); }
function subChat(cid){ if(chanChat){sb.removeChannel(chanChat);chanChat=null;} if(!cid)return; chanChat=sb.channel('chat-'+cid).on('postgres_changes',{event:'INSERT',schema:'public',table:'messages',filter:'client_id=eq.'+cid},function(p){MSGS.push(p.new);paintChat();}).subscribe(); }
async function sendChat(txt){ const cid=curClientId(); if(!cid||!txt.trim())return; const sender=st.role==='coach'?'coach':'client'; const {error}=await sb.from('messages').insert({client_id:cid,sender,body:txt.trim()}); if(error){console.error(error);toast(st.lang==='ar'?'ما انبعت':'Not sent');} }
function escMsg(s){return (s||'').replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];});}
function paintChat(){ const box=document.getElementById('liveChat'); if(!box)return; const who=st.role==='coach'?'coach':'client';
 box.innerHTML = MSGS.length ? MSGS.map(function(m){var mine=m.sender===who;var tm=new Date(m.created_at).toLocaleTimeString(st.lang==='ar'?'ar':'en',{hour:'2-digit',minute:'2-digit'});return '<div class="msg '+(mine?'me':'coach')+'">'+escMsg(m.body)+'<div class="t">'+tm+'</div></div>';}).join('')
  : '<div style="color:var(--muted);text-align:center;padding:22px;font-size:13px">'+(st.lang==='ar'?'ابدأ المحادثة':'Start the conversation')+'</div>';
 box.scrollTop=box.scrollHeight;
}

let AUTH_clientId=null;

/* ---- live render wrapper (renderApp = original) ---- */
function render(){
 if(!st.authed){ showEntry(); ensureChrome(); return; }
 renderApp();
 try{ var bn=document.getElementById('brandName'); if(bn) bn.textContent=(st.lang==='ar'?(CFG.BRAND_NAME_AR||'تطبيق التدريب'):(CFG.BRAND_NAME_EN||'Training App')); var hh=document.getElementById('hint'); if(hh)hh.innerHTML=''; }catch(e){}
 ensureChrome();
 var inChat=(st.role==='coach'&&st.cv==='detail'&&st.ctab==='chat')||(st.role==='client'&&st.atab==='chat');
 if(inChat){ var cid=curClientId(); loadChat(cid).then(function(){ paintChat(); subChat(cid); var inp=document.getElementById('chatInp'); var btn=document.querySelector('[data-chatsend]'); if(btn)btn.onclick=function(){ if(inp&&inp.value.trim()){ sendChat(inp.value); inp.value=''; } }; if(inp)inp.onkeydown=function(e){ if(e.key==='Enter'){ e.preventDefault(); if(inp.value.trim()){ sendChat(inp.value); inp.value=''; } } }; }); }
 else if(chanChat&&sb){ sb.removeChannel(chanChat); chanChat=null; }
}
async function boot(){ st.authed=false; if(!CONFIG_OK){ render(); return; } var role=null; try{ role=localStorage.getItem('liveRole'); }catch(e){}
 if(role==='coach'){ await enterCoach(); return; }
 if(role==='client'){ var id=null; try{ id=localStorage.getItem('liveClientId'); }catch(e){} if(id){ try{ var row=await loadClientById(id); if(row){ await loadExercisesDB(); clients.length=0; clients.push(mapClient(row,0)); programs[0]=row.program||{}; st.clog=row.logs||{}; st.habits=row.habits||{}; st.onb=!!row.onboarded; st.role='client'; st.authed=true; st.atab='home'; render(); return; } }catch(e){ console.error(e); } } }
 render();
}

 const steps=`<div class="onb-steps">${[0,1,2].map(i=>`<i class="${i<=s?'on':''}"></i>`).join('')}</div>`;let f='';
 if(s===0)f=`<div class="ofield"><label>${t.oName}</label><input id="o_name" value="${d.name||'مازن العتيبي'}"></div><div class="orow"><div class="ofield"><label>${t.oAge}</label><input id="o_age" value="${d.age||'29'}" inputmode="numeric"></div><div class="ofield"><label>${t.oGender}</label><select id="o_gender"><option value="m">${t.male}</option><option value="f">${t.female}</option></select></div></div><div class="orow"><div class="ofield"><label>${t.oHeight}</label><input id="o_height" value="${d.height||'178'}" inputmode="numeric"></div><div class="ofield"><label>${t.oWeight}</label><input id="o_weight" value="${d.weight||'82'}" inputmode="numeric"></div></div>`;
 if(s===1)f=`<div class="orow"><div class="ofield"><label>${t.oWaist}</label><input id="o_waist" value="${d.waist||'86'}" inputmode="numeric"></div><div class="ofield"><label>${t.oBf}</label><input id="o_bf" value="${d.bf||'18'}" inputmode="numeric"></div></div><div class="orow"><div class="ofield"><label>${t.oChest}</label><input id="o_chest" value="${d.chest||'104'}" inputmode="numeric"></div><div class="ofield"><label>${t.oArm}</label><input id="o_arm" value="${d.arm||'36'}" inputmode="numeric"></div></div>`;
 if(s===2)f=`<div class="ofield"><label>${t.oLevelQ}</label><div class="opts">${['beg','int','adv'].map(lv=>`<div class="opt ${d.level===lv?'on':''}" data-lv="${lv}"><span>${t.level[lv]}</span><span class="r"></span></div>`).join('')}</div></div><div class="ofield"><label>${t.oGoalQ}</label><div class="opts">${['strength','cut','recomp','endurance'].map(g=>`<div class="opt ${d.goal===g?'on':''}" data-gl="${g}"><span>${t.goals[g]}</span><span class="r"></span></div>`).join('')}</div></div><div class="ofield"><label>${t.oInjQ}</label><div class="checks">${Object.keys(t.injList).map(i=>`<div class="ck ${d.inj.includes(i)?'on':''}" data-inj="${i}">${t.injList[i]}</div>`).join('')}</div></div>`;
 return `<div class="onb">${steps}<h2>${t.onbT[s]}</h2><div class="sub">${t.onbS[s]}</div>${f}<div class="onb-foot">${s>0?`<button class="btn" data-onb="back">${t.prevb}</button>`:''}<button class="btn pri" data-onb="${s<2?'next':'finish'}" style="flex:1">${s<2?t.next:t.finish}</button></div></div>`;
}

/* ===== modals ===== */
function renderModal(){const t=T();const L2=document.getElementById('modalLayer');
 if(!st.modal){L2.innerHTML='';return}
 let inner='';
 if(st.modal==='invite'){
  inner=`<h3>${t.invTitle}</h3><div class="ms">${t.invSub}</div>
   <div class="fld" style="margin-bottom:11px"><label>${t.invName}</label><input id="inv_name"></div>
   <div class="fld"><label>${t.invEmail}</label><input id="inv_email"></div>
   <div class="invite-box"><span class="code" id="inv_code">coachmate.app/join/CM-${Math.random().toString(36).slice(2,6).toUpperCase()}</span><button class="btn sm pri" data-copyinv>${t.invCopy}</button></div>
   ${invites.length?`<div class="eyebrow" style="margin:14px 0 6px">${t.pending}</div>${invites.map(iv=>`<div class="pending-row"><div class="av" style="width:30px;height:30px;border-radius:8px;background:var(--ink-4);font-size:12px;color:var(--text)">${iv.name?iv.name.charAt(0):'؟'}</div><div>${iv.name||t.invName}<div class="mono" style="font-size:11px;color:var(--muted)">${iv.code}</div></div><span class="st">⏳ ${t.pendingSt}</span></div>`).join('')}`:''}
   <div style="display:flex;gap:9px;margin-top:16px"><button class="btn pri" data-geninv style="flex:1">${t.invGen}</button><button class="btn" data-closemodal>${t.cancel}</button></div>`;
 } else if(st.modal==='assign'){
  inner=`<h3>${t.assignTitle}</h3><div class="ms">${t.tmplSub}</div>
   <div class="assign-list">${clients.map((c,i)=>`<div class="assign-row ${st.assignSel.includes(i)?'on':''}" data-asg="${i}"><div class="cb">✓</div><div class="av" style="width:32px;height:32px;border-radius:9px;background:${c.av};font-size:13px">${initials(c[st.lang])}</div><div>${c[st.lang]}</div></div>`).join('')}</div>
   <div style="display:flex;gap:9px"><button class="btn pri" data-doassign style="flex:1">${t.assignBtn}${st.assignSel.length?` (${st.assignSel.length})`:''}</button><button class="btn" data-closemodal>${t.cancel}</button></div>`;
 }
 L2.innerHTML=`<div class="modal-bg" data-bgclose><div class="modal" onclick="event.stopPropagation()">${inner}</div></div>`;
 bindModal();
}

/* ===== rest timer ===== */
function startRest(sec){clearInterval(st.restInt);st.rest={active:true,rem:sec,total:sec,paused:false};renderTimer();st.restInt=setInterval(()=>{if(st.rest.paused)return;st.rest.rem--;if(st.rest.rem<=0){clearInterval(st.restInt);st.rest.active=false;renderTimer();return}updateTimerDOM()},1000)}
function endRest(){clearInterval(st.restInt);st.rest.active=false;renderTimer()}
function renderTimer(){const t=T();const L2=document.getElementById('timerLayer');if(!st.rest.active||st.role==='coach'){L2.classList.remove('show');L2.innerHTML='';return}
 const pct=Math.round(st.rest.rem/st.rest.total*100);L2.innerHTML=`<div class="rt"><div class="ring2"><svg width="50" height="50"><circle cx="25" cy="25" r="21" fill="none" stroke="var(--ink-4)" stroke-width="4"/><circle id="rtArc" cx="25" cy="25" r="21" fill="none" stroke="var(--ember)" stroke-width="4" stroke-linecap="round" stroke-dasharray="${2*Math.PI*21}" stroke-dashoffset="${2*Math.PI*21*(1-pct/100)}"/></svg><div class="n" id="rtNum">${st.rest.rem}</div></div><div class="tx"><div class="a">${t.restNow}</div><div class="b">${t.nextSet}</div></div><div class="ctl"><button data-rt="pm">${t.plus}</button><button data-rt="pause">${st.rest.paused?t.resume:t.pause}</button><button class="pri" data-rt="skip">${t.skip}</button></div></div>`;L2.classList.add('show');
 L2.querySelectorAll('[data-rt]').forEach(el=>el.onclick=()=>{const a=el.dataset.rt;if(a==='skip')endRest();else if(a==='pause'){st.rest.paused=!st.rest.paused;renderTimer()}else if(a==='pm'){st.rest.rem+=15;st.rest.total=Math.max(st.rest.total,st.rest.rem);updateTimerDOM()}});
}
function updateTimerDOM(){const n=document.getElementById('rtNum');const a=document.getElementById('rtArc');if(!n)return renderTimer();n.textContent=st.rest.rem;a.setAttribute('stroke-dashoffset',2*Math.PI*21*(1-st.rest.rem/st.rest.total))}

/* ===== render + bind ===== */
function renderApp(){const t=T();document.documentElement.lang=st.lang;document.documentElement.dir=t.dir;
 document.documentElement.style.setProperty('--ember',st.settings.accent);
 document.getElementById('brandName').textContent=t.brand;
 document.getElementById('logoBox').innerHTML=st.settings.logo?st.settings.logo:ICN.barbell;
 document.getElementById('tgCoach').textContent=st.lang==='ar'?'لوحة المدرب':'Coach dashboard';
 document.getElementById('tgClient').textContent=st.lang==='ar'?'تطبيق المشترك':'Client app';
 document.getElementById('hint').innerHTML=st.role==='coach'?t.hintCoach:t.hintClient;
 document.getElementById('view').innerHTML=st.role==='coach'?coach():client();
 renderTimer();renderModal();bind();
}
function bind(){const v=document.getElementById('view');
 v.querySelectorAll('[data-nav]').forEach(el=>el.onclick=()=>{st.cv=el.dataset.nav;st.showAdd=false;render()});
 v.querySelectorAll('[data-open]').forEach(el=>el.onclick=e=>{e.stopPropagation();st.sel=+el.dataset.open;st.cv='detail';st.ctab='overview';render()});
 v.querySelectorAll('[data-msg]').forEach(el=>el.onclick=e=>{e.stopPropagation();st.sel=+el.dataset.msg;st.cv='detail';st.ctab='chat';render()});
 v.querySelectorAll('[data-sort]').forEach(el=>el.onclick=()=>{st.sort=el.dataset.sort;render()});
 v.querySelectorAll('[data-ctab]').forEach(el=>el.onclick=()=>{st.ctab=el.dataset.ctab;st.showAdd=false;render()});
 v.querySelectorAll('[data-invite]').forEach(el=>el.onclick=()=>{st.modal='invite';render()});
 v.querySelectorAll('[data-review]').forEach(el=>el.onclick=()=>{st.cv='review';render()});
 v.querySelectorAll('[data-fb]').forEach(el=>el.onclick=()=>{delete st.formSent[el.dataset.fb];toast(T().fbSent);if(!reviewCount())st.cv='home';render()});
 // builder
 v.querySelectorAll('[data-day]').forEach(el=>el.onclick=()=>{st.day=el.dataset.day;st.showAdd=false;render()});
 v.querySelectorAll('[data-addex]').forEach(el=>el.onclick=()=>{st.showAdd=true;render()});
 v.querySelectorAll('[data-addday]').forEach(el=>el.onclick=()=>{progFor(st.sel)[el.dataset.addday]={title_ar:'يوم جديد',title_en:'New day',warmup_ar:'',warmup_en:'',cooldown_ar:'',cooldown_en:'',items:[]};persistProgram(st.sel);st.showAdd=true;render()});
 v.querySelectorAll('[data-addcancel]').forEach(el=>el.onclick=()=>{st.showAdd=false;render()});
 v.querySelectorAll('[data-pick]').forEach(el=>el.onclick=()=>{const p=progFor(st.sel);if(!p[st.day])p[st.day]={title_ar:'يوم جديد',title_en:'New day',warmup_ar:'',warmup_en:'',cooldown_ar:'',cooldown_en:'',items:[]};p[st.day].items.push(newItem(+el.dataset.pick));persistProgram(st.sel);st.showAdd=false;toast(T().added);render()});
 v.querySelectorAll('[data-rm]').forEach(el=>el.onclick=()=>{progFor(st.sel)[st.day].items.splice(+el.dataset.rm,1);persistProgram(st.sel);render()});
 v.querySelectorAll('[data-ss]').forEach(el=>el.onclick=()=>{const it=progFor(st.sel)[st.day].items[+el.dataset.ss];it.superset=!it.superset;persistProgram(st.sel);render()});
 v.querySelectorAll('[data-f]').forEach(el=>el.onchange=()=>{progFor(st.sel)[st.day].items[+el.dataset.ix][el.dataset.f]=el.value;persistProgram(st.sel)});
 v.querySelectorAll('[data-note]').forEach(el=>el.onchange=()=>{const it=progFor(st.sel)[st.day].items[+el.dataset.note];if(st.lang==='ar')it.note_ar=el.value;else it.note_en=el.value;persistProgram(st.sel)});
 v.querySelectorAll('[data-wc]').forEach(el=>el.onchange=()=>{const d=progFor(st.sel)[st.day];d[el.dataset.wc+(st.lang==='ar'?'_ar':'_en')]=el.value;persistProgram(st.sel)});
 v.querySelectorAll('[data-daytitle]').forEach(el=>el.onchange=()=>{const d=progFor(st.sel)[st.day];if(st.lang==='ar')d.title_ar=el.value;else d.title_en=el.value;persistProgram(st.sel)});
 v.querySelectorAll('[data-tmpl]').forEach(el=>el.onclick=async()=>{const d=progFor(st.sel)[st.day];if(d){const tm=await addTemplateDB({ar:d.title_ar+' (نسخة)',en:(d.title_en||d.title_ar)+' (copy)',items:JSON.parse(JSON.stringify(d.items))});templates.push(tm);}toast(T().saved);render()});
 // library
 v.querySelectorAll('[data-addopen]').forEach(el=>el.onclick=()=>{st.showAdd=true;render()});
 v.querySelectorAll('[data-upload]').forEach(el=>el.onclick=()=>toast(st.lang==='ar'?'(تجريبي) اختر فيديو':'(demo) pick a video'));
 const savex=v.querySelector('[data-savex]');if(savex)savex.onclick=async()=>{const ar=v.querySelector('#ad_ar').value.trim()||'تمرين جديد';const en=v.querySelector('#ad_en').value.trim()||'New exercise';const m=v.querySelector('#ad_m').value;const yt=ytIdFrom(v.querySelector('#ad_yt').value.trim());const note=v.querySelector('#ad_note').value.trim();const row=await addExerciseDB({name_ar:ar,name_en:en,muscle:m,yt:yt||'',note_ar:note,note_en:note});if(row)exercises.unshift(mapExercise(row));st.showAdd=false;toast(T().added);render()};
 // templates assign
 v.querySelectorAll('[data-assign]').forEach(el=>el.onclick=()=>{st.modal='assign';st.assignSel=[];render()});
 // settings
 v.querySelectorAll('[data-accent]').forEach(el=>el.onclick=()=>{st.settings.accent=el.dataset.accent;render()});
 v.querySelectorAll('[data-integ]').forEach(el=>el.onclick=()=>{st.settings.integ[el.dataset.integ]=!st.settings.integ[el.dataset.integ];render()});
 v.querySelectorAll('[data-notif]').forEach(el=>el.onclick=()=>{st.settings.notif[el.dataset.notif]=!st.settings.notif[el.dataset.notif];render()});
 const sl=v.querySelector('#set_logo');if(sl)sl.onchange=()=>{st.settings.logo=sl.value;render()};
 const sp=v.querySelector('#set_price');if(sp)sp.onchange=()=>{st.settings.price=sp.value};
 // client
 v.querySelectorAll('[data-atab]').forEach(el=>el.onclick=()=>{st.atab=el.dataset.atab;st.play=null;st.resched=false;render()});
 v.querySelectorAll('[data-play]').forEach(el=>el.onclick=()=>{const ix=+el.dataset.play;st.play=st.play===ix?null:ix;render()});
 v.querySelectorAll('[data-resched]').forEach(el=>el.onclick=()=>{st.resched=true;render()});
 v.querySelectorAll('[data-move]').forEach(el=>el.onclick=()=>{st.resched=false;toast(T().moved+' '+el.dataset.move);render()});
 v.querySelectorAll('[data-form]').forEach(el=>el.onclick=()=>{st.formSent[el.dataset.form]=true;toast(st.lang==='ar'?'انبعت الفيديو للمدرب ✓':'Video sent to coach ✓');render()});
 v.querySelectorAll('[data-log]').forEach(el=>el.onchange=()=>{const k=el.dataset.log;st.clog[k]=st.clog[k]||{reps:'',weight:'',done:false};st.clog[k][el.dataset.fld]=el.value});
 v.querySelectorAll('[data-logbtn]').forEach(el=>el.onclick=()=>{const k=el.dataset.logbtn;const cur=st.clog[k];if(cur&&cur.done){delete st.clog[k];persistLogs(0);render();return}const reps=(v.querySelector(`[data-log="${k}"][data-fld="reps"]`)||{}).value||'';const weight=(v.querySelector(`[data-log="${k}"][data-fld="weight"]`)||{}).value||'';st.clog[k]={reps,weight,done:true};persistLogs(0);if(st.settings.auto)startRest(+el.dataset.rest||st.settings.restSec);render()});
 v.querySelectorAll('[data-habit]').forEach(el=>el.onclick=()=>{st.habits[el.dataset.habit]=!st.habits[el.dataset.habit];persistLogs(0);render()});
 v.querySelectorAll('[data-rest-step]').forEach(el=>el.onclick=()=>{st.settings.restSec=Math.max(15,st.settings.restSec+ +el.dataset.restStep);render()});
 const aut=v.querySelector('[data-auto]');if(aut)aut.onclick=()=>{st.settings.auto=!st.settings.auto;render()};
 v.querySelectorAll('[data-setlang]').forEach(el=>el.onclick=()=>{st.lang=el.dataset.setlang;syncLang();render()});
 const redo=v.querySelector('[data-redo]');if(redo)redo.onclick=()=>{st.onb=false;st.onbStep=0;st.atab='home';render()};
 v.querySelectorAll('[data-onb]').forEach(el=>el.onclick=()=>{const a=el.dataset.onb;if(a==='back'){st.onbStep--;render();return}if(st.onbStep===0)['name','age','gender','height','weight'].forEach(f=>{const i=v.querySelector('#o_'+f);if(i)st.onbData[f]=i.value});if(st.onbStep===1)['waist','bf','chest','arm'].forEach(f=>{const i=v.querySelector('#o_'+f);if(i)st.onbData[f]=i.value});if(a==='next'){st.onbStep++;render();return}const c=clients[0],d=st.onbData;if(d.name){c.ar=d.name;c.en=d.name}if(d.age)c.age=+d.age;if(d.height)c.height=+d.height;if(d.weight)c.weight=+d.weight;if(d.waist)c.waist=+d.waist;if(d.bf)c.bf=+d.bf;if(d.chest)c.chest=+d.chest;if(d.arm)c.arm=+d.arm;c.level=d.level;c.g=d.goal;c.inj=d.inj.filter(x=>x!=='none');var _p={onboarded:true,age:c.age,height:c.height,weight:c.weight,gender:c.gender,level:c.level,goal:c.g,injuries:c.inj,measurements:{waist:c.waist,bf:c.bf,chest:c.chest,arm:c.arm,wHist:c.wHist}};if(d.name)_p.name=d.name;persistClientFields(0,_p);st.onb=true;st.atab='home';toast(st.lang==='ar'?'تم! جدولك جاهز':'Done! Your plan is ready');render()});
 v.querySelectorAll('[data-lv]').forEach(el=>el.onclick=()=>{st.onbData.level=el.dataset.lv;render()});
 v.querySelectorAll('[data-gl]').forEach(el=>el.onclick=()=>{st.onbData.goal=el.dataset.gl;render()});
 v.querySelectorAll('[data-inj]').forEach(el=>el.onclick=()=>{const i=el.dataset.inj,arr=st.onbData.inj;if(i==='none')st.onbData.inj=['none'];else{const ix=arr.indexOf(i);if(ix>=0)arr.splice(ix,1);else{arr.push(i);const ni=arr.indexOf('none');if(ni>=0)arr.splice(ni,1)}}render()});
}
function bindModal(){const L2=document.getElementById('modalLayer');
 L2.querySelectorAll('[data-bgclose]').forEach(el=>el.onclick=()=>{st.modal=null;render()});
 L2.querySelectorAll('[data-closemodal]').forEach(el=>el.onclick=()=>{st.modal=null;render()});
 const cp=L2.querySelector('[data-copyinv]');if(cp)cp.onclick=()=>{toast(T().invCopied)};
 const gi=L2.querySelector('[data-geninv]');if(gi)gi.onclick=async()=>{const nm=(L2.querySelector('#inv_name')||{}).value||'';const row=await addClientDB(nm);if(row){await loadClientsDB();st.modal=null;toast((st.lang==='ar'?'تولّد المشترك ✓ رمزه: ':'Client created ✓ code: ')+row.invite_code);render();}};
 L2.querySelectorAll('[data-asg]').forEach(el=>el.onclick=()=>{const i=+el.dataset.asg;const ix=st.assignSel.indexOf(i);if(ix>=0)st.assignSel.splice(ix,1);else st.assignSel.push(i);render()});
 const da=L2.querySelector('[data-doassign]');if(da)da.onclick=()=>{if(!st.assignSel.length){toast(st.lang==='ar'?'اختر مشترك ع الأقل':'Pick at least one');return}st.modal=null;toast(T().assigned+' ('+st.assignSel.length+')');render()};
}
function syncLang(){document.querySelectorAll('#langTg button').forEach(x=>x.classList.toggle('on',x.dataset.lang===st.lang))}
document.getElementById('langTg').addEventListener('click',function(e){var b=e.target.closest('button');if(!b)return;st.lang=b.dataset.lang;syncLang();render();});
boot();
</script>
</body>
